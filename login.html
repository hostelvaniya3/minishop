<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiniShop | Login</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/main.js" defer></script>
    <script src="js/auth.js" defer></script>
</head>

<body>
    <!-- Header for login.html: navigation bar and main menu for the user authentication page -->
    <header class="site-header">
        <div class="container nav-container">
            <a href="index.html" class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path>
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <path d="M16 10a4 4 0 0 1-8 0"></path>
                </svg>
                <span>Mini</span>Shop
            </a>

            <nav>
                <button class="mobile-menu-btn" aria-label="Toggle menu" id="mobile-menu-btn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="3" y1="12" x2="21" y2="12"></line>
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <line x1="3" y1="18" x2="21" y2="18"></line>
                    </svg>
                </button>
                <ul class="nav-links" id="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="products.html">Products</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="blog.html">Blog</a></li>
                    <li><a href="login.html" class="active">Login</a></li>
                    <li><a href="register.html">Register</a></li>
                    <li>
                        <a href="cart.html" class="cart-icon-wrapper">
                            Cart
                            <span class="cart-badge" id="cart-badge">0</span>
                        </a>
                    </li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- The main application body containing a centered card layout tailored for the login form -->
    <main>
        <section class="container">
            <div class="auth-container">
                <h1 class="auth-title">Welcome Back, Shopaholic!</h1>
                <div id="login-alert"></div>
                <form id="login-form" novalidate>
                    <div class="form-group">
                        <label for="email">What's your email?</label>
                        <input type="email" id="email" class="form-control" placeholder="hey@minishop.com" required>
                        <span class="error-msg" id="email-error">Please enter a valid email address.</span>
                    </div>
                    <div class="form-group">
                        <label for="password">Enter your secret password</label>
                        <input type="password" id="password" class="form-control" placeholder="Shhh... it's a secret"
                            required>
                        <span class="error-msg" id="password-error">Password is required.</span>
                    </div>
                    <div style="text-align: right; margin-bottom: 1rem; margin-top: -0.5rem;">
                        <a href="#" style="color: var(--primary); font-size: 0.875rem; text-decoration: none;">Forgot
                            password?</a>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%;">Log In</button>
                </form>
                <div class="auth-footer">
                    <p>Don't have an account? <a href="register.html">Sign up</a></p>
                </div>
            </div>
        </section>
    </main>

    <!-- Simplified footer specifically designed to act as a closing tag for auth pages -->
    <footer class="site-footer">
        <div class="container">
            <div class="footer-bottom" style="border-top: none;">
                <p>&copy; 2024 MiniShop Application. Handcrafted by me for university.</p>
            </div>
        </div>
    </footer>
</body>

</html>
